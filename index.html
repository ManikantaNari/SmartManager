<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport">
    <title>Manikanta Enterprises</title>
    <link href="json/manifest.json" rel="manifest">
    <meta content="#1a1a2e" name="theme-color">
    <meta content="yes" name="apple-mobile-web-app-capable">
    <meta content="black-translucent" name="apple-mobile-web-app-status-bar-style">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <!-- App Container - Templates loaded dynamically -->
    <div id="app"></div>

    <!-- Firebase SDK (loaded before modules) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- App Modules (ES6) -->
    <script type="module" src="js/bridges.js"></script>
</body>
</html>
